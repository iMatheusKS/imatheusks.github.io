<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matheus | Portfólio</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #1e293b;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 500px;
            text-align: center;
            border: 1px solid #334155;
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 0.5rem;
        }
        p {
            color: #94a3b8;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Olá, eu sou o Matheus! 👋</h1>
        <p>Desenvolvedor e entusiasta de tecnologia. Este é o meu portfólio em construção.</p>
    </div>
</body>
</html>
